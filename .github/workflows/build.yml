name: build

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.properties.outputs.version }}
      changelog: ${{ steps.properties.outputs.changelog }}

    steps:
    - uses: actions/checkout@v7

    - uses: actions/setup-java@v5
      with:
        distribution: zulu
        java-version: 21

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Export Properties
      id: properties
      shell: bash
      run: |
        cat CHANGELOG.md
        PROPERTIES="$(./gradlew properties --console=plain -q)"
        VERSION="$(echo "$PROPERTIES" | grep "^version:" | cut -f2- -d ' ')"
        CHANGELOG="$(./gradlew getChangelog --unreleased --no-header --console=plain -q)"

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: build
      run: ./gradlew build

    - name: archive test results
      uses: actions/upload-artifact@v7
      with:
        name: test_results
        path: build/reports/tests/test/

    - name: archive strata
      uses: actions/upload-artifact@v7
      with:
        name: strata
        path: strata/build/libs/*.jar

  snapshot:
    name: Publish Snapshot
    if: github.event_name == 'push'
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Fetch Sources
        uses: actions/checkout@v7

      - name: Set up a JDK
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: zulu

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Publish to Maven Central Snapshots
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.SONATYPE_TOKEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.SONATYPE_TOKEN_PASSWORD }}
          SNAPSHOT_VERSION: ${{ needs.build.outputs.version }}-SNAPSHOT
        run: ./gradlew -PVERSION_NAME="$SNAPSHOT_VERSION" -PsignAllPublications=false --no-configuration-cache publishToMavenCentral

  # Prepare a draft release for GitHub Releases page for the manual verification
  # If accepted and published, release workflow would be triggered
  releaseDraft:
    name: Release Draft
    if: github.event_name != 'pull_request'
    needs: [ build ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Fetch Sources
        uses: actions/checkout@v7

      - name: Fetch strata
        uses: actions/download-artifact@v8
        with:
          name: strata
          path: ${{ github.workspace }}/dist

      # Remove old release drafts by using the curl request for the available releases with draft flag
      - name: Remove Old Release Drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/{owner}/{repo}/releases \
            --jq '.[] | select(.draft == true) | .id' \
            | xargs -I '{}' gh api -X DELETE repos/{owner}/{repo}/releases/{}

      # Create new release draft - which is not publicly visible and requires manual acceptance
      - name: Create Release Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ needs.build.outputs.changelog }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "v$VERSION" ${{ github.workspace }}/dist/strata*.jar \
            --draft \
            --title "v$VERSION" \
            --notes "$RELEASE_NOTES"
